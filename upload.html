<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firdevs & Hasan Çağlar — Anı Galerisi</title>
<link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:    #c9a96e;
  --gold2:   #e8d5b0;
  --gold3:   #a07840;
  --dark:    #0e0b08;
  --dark2:   #1a1410;
  --cream:   #f5efe6;
  --glass:   rgba(255,255,255,0.05);
  --gb:      rgba(255,255,255,0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--dark);
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}

.site-bg {
  position: fixed; inset: 0; z-index: -1;
  background: url("https://images.unsplash.com/photo-1519741497674-611481863552?w=1600") center/cover no-repeat;
  filter: brightness(0.75);
  transform: translate3d(0,0,0);
  -webkit-transform: translate3d(0,0,0);
}

body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── PAGE HEADER ── */
.page-header {
  position: relative; z-index: 1;
  padding: 60px 20px 40px;
  text-align: center;
}

.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); opacity: .65;
  text-decoration: none;
  transition: opacity .3s;
  margin-bottom: 32px;
}
.back-link:hover { opacity: 1; }
.back-link svg { width: 14px; height: 14px; }

.ornament {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin-bottom: 20px;
}
.ornament-line { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); opacity: .5; }
.ornament-line.r { background: linear-gradient(to left, transparent, var(--gold)); }
.ornament-text { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); opacity: .8; }

.page-title {
  font-family: 'Luxurious Script', cursive;
  font-size: clamp(44px, 10vw, 80px);
  line-height: 1.1;
  color: var(--cream);
}
.page-sub {
  margin-top: 12px;
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(245,239,230,.4);
}

/* ── MAIN CONTENT ── */
.main-content {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 0 20px 80px;
  display: flex; flex-direction: column; gap: 56px;
}

/* ── UPLOAD CARD ── */
.upload-card {
  background: var(--glass);
  border: 1px solid var(--gb);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  padding: 36px 32px;
}

.card-label {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold); opacity: .7;
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
}
.card-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, rgba(201,169,110,0.3), transparent);
}

/* drop zone */
.drop-zone {
  border: 1.5px dashed rgba(201,169,110,0.3);
  border-radius: 16px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color .3s, background .3s;
  position: relative;
  overflow: hidden;
}
.drop-zone.drag-over {
  border-color: var(--gold);
  background: rgba(201,169,110,0.06);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-icon {
  width: 48px; height: 48px; margin: 0 auto 14px;
  color: var(--gold); opacity: .5;
}
.drop-title {
  font-size: 16px; letter-spacing: 2px;
  color: var(--gold2); margin-bottom: 6px;
}
.drop-sub { font-size: 12px; letter-spacing: 1px; opacity: .4; }

/* preview */
.preview-wrap {
  display: none;
  margin-top: 16px;
  position: relative;
  border-radius: 12px; overflow: hidden;
  max-height: 280px;
}
.preview-wrap img {
  width: 100%; height: 280px; object-fit: cover; display: block;
  border-radius: 12px;
}
.preview-clear {
  position: absolute; top: 10px; right: 10px;
  background: rgba(14,11,8,.8); border: 1px solid rgba(201,169,110,.3);
  color: var(--gold2); border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  transition: background .2s;
}
.preview-clear:hover { background: rgba(14,11,8,1); }

/* form fields */
.form-fields {
  margin-top: 24px;
  display: flex; flex-direction: column; gap: 16px;
}

.field-group { display: flex; flex-direction: column; gap: 8px; }
.field-label {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); opacity: .7;
}
.field-required { color: var(--gold); margin-left: 2px; }

.field-input, .field-textarea {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  letter-spacing: .5px;
  outline: none;
  transition: border-color .3s, background .3s;
  width: 100%;
}
.field-input::placeholder, .field-textarea::placeholder { opacity: .35; }
.field-input:focus, .field-textarea:focus {
  border-color: rgba(201,169,110,0.6);
  background: rgba(255,255,255,0.07);
}
.field-textarea { resize: vertical; min-height: 80px; }

/* submit button */
.btn-submit {
  margin-top: 8px;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%;
  padding: 16px 32px;
  border-radius: 40px;
  border: 1px solid rgba(201,169,110,0.4);
  background: linear-gradient(135deg, rgba(201,169,110,0.15), rgba(201,169,110,0.05));
  color: var(--gold2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer;
  transition: background .3s, border-color .3s, transform .2s, opacity .3s;
  backdrop-filter: blur(10px);
}
.btn-submit:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(201,169,110,0.28), rgba(201,169,110,0.12));
  border-color: var(--gold);
  transform: translateY(-2px);
}
.btn-submit:disabled { opacity: .45; cursor: not-allowed; }

/* status messages */
.status-msg {
  display: none;
  margin-top: 14px;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 14px; letter-spacing: .5px;
  text-align: center;
}
.status-msg.success {
  display: block;
  background: rgba(100,180,100,0.1);
  border: 1px solid rgba(100,180,100,0.3);
  color: #9de89d;
}
.status-msg.error {
  display: block;
  background: rgba(200,80,80,0.1);
  border: 1px solid rgba(200,80,80,0.3);
  color: #f09090;
}

/* progress bar */
.progress-bar-wrap {
  display: none;
  margin-top: 14px;
  height: 3px;
  background: rgba(201,169,110,0.15);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(to right, var(--gold3), var(--gold));
  border-radius: 3px;
  width: 0%;
  transition: width .3s ease;
}

/* ── GALLERY SECTION ── */
.gallery-section { display: flex; flex-direction: column; gap: 28px; }

.gallery-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.gallery-title-wrap { display: flex; flex-direction: column; gap: 4px; }
.gallery-title {
  font-family: 'Luxurious Script', cursive;
  font-size: clamp(28px, 6vw, 44px);
  color: var(--cream); line-height: 1;
}
.gallery-count {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); opacity: .55;
}

/* view toggle */
.view-toggle {
  display: flex;
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 30px;
  overflow: hidden;
}
.view-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(245,239,230,.4);
  background: transparent;
  border: none; cursor: pointer;
  transition: background .2s, color .2s;
}
.view-btn svg { width: 14px; height: 14px; }
.view-btn.active {
  background: rgba(201,169,110,0.15);
  color: var(--gold2);
}
.view-btn:hover:not(.active) { color: var(--gold); }

/* ── SLIDESHOW ── */
.slideshow-wrap {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--gb);
  user-select: none;
}

.slide-track {
  display: flex;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}

.slide-item {
  flex: 0 0 100%;
  position: relative;
}
.slide-item img {
  width: 100%; height: 420px; object-fit: cover; display: block;
}
.slide-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 24px;
  background: linear-gradient(to top, rgba(14,11,8,.85), transparent);
}
.slide-name {
  font-family: 'Luxurious Script', cursive;
  font-size: 22px; color: var(--gold2); line-height: 1;
}
.slide-comment {
  margin-top: 4px;
  font-size: 13px; font-style: italic; opacity: .65;
  letter-spacing: .3px;
}
.slide-date {
  margin-top: 6px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: .35;
}

/* nav buttons */
.slide-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(14,11,8,.55);
  border: 1px solid rgba(201,169,110,.25);
  border-radius: 50%; cursor: pointer;
  color: var(--gold2);
  transition: background .25s, border-color .25s;
  z-index: 2;
}
.slide-nav:hover { background: rgba(14,11,8,.85); border-color: var(--gold); }
.slide-nav.prev { left: 14px; }
.slide-nav.next { right: 14px; }
.slide-nav svg { width: 16px; height: 16px; }

/* dots */
.slide-dots {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 14px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(201,169,110,.25);
  cursor: pointer; transition: background .3s, transform .3s;
}
.dot.active { background: var(--gold); transform: scale(1.4); }

/* counter badge */
.slide-counter {
  position: absolute; top: 14px; right: 14px;
  background: rgba(14,11,8,.6); border: 1px solid rgba(201,169,110,.2);
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; letter-spacing: 2px; color: var(--gold); opacity: .8;
  z-index: 2;
}

/* empty state */
.gallery-empty {
  text-align: center;
  padding: 60px 24px;
  background: var(--glass);
  border: 1px solid var(--gb);
  border-radius: 20px;
}
.gallery-empty-icon { font-size: 40px; margin-bottom: 16px; opacity: .3; }
.gallery-empty-text {
  font-size: 14px; letter-spacing: 1px; opacity: .4;
  line-height: 1.7;
}

/* ── GRID ── */
.gallery-grid {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.gallery-grid.visible { display: grid; }

.grid-item {
  position: relative; overflow: hidden;
  border-radius: 14px; aspect-ratio: 1;
  cursor: pointer;
  border: 1px solid rgba(201,169,110,.1);
}
.grid-item img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
  transition: transform .4s ease;
}
.grid-item:hover img { transform: scale(1.06); }
.grid-item-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(14,11,8,.8) 0%, transparent 50%);
  opacity: 0; transition: opacity .3s;
  display: flex; align-items: flex-end; padding: 12px;
}
.grid-item:hover .grid-item-overlay { opacity: 1; }
.grid-item-name {
  font-family: 'Luxurious Script', cursive;
  font-size: 16px; color: var(--gold2); line-height: 1;
}

/* ── LIGHTBOX ── */
.lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(14,11,8,.93);
  backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  flex-direction: column;
  padding: 20px;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 100%; max-height: 75vh;
  border-radius: 12px;
  object-fit: contain;
  border: 1px solid rgba(201,169,110,.15);
}
.lightbox-caption {
  margin-top: 16px; text-align: center;
}
.lightbox-name {
  font-family: 'Luxurious Script', cursive;
  font-size: 26px; color: var(--gold2);
}
.lightbox-comment {
  font-size: 14px; font-style: italic; opacity: .55; margin-top: 4px;
}
.lightbox-close {
  position: absolute; top: 20px; right: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.08); border: 1px solid rgba(201,169,110,.2);
  color: var(--cream); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.lightbox-close:hover { background: rgba(255,255,255,.15); }

/* loading spinner */
.spinner-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(201,169,110,.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* page bottom */
.page-bottom {
  padding: 0 20px 60px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  position: relative; z-index: 1;
}
.bottom-ornament {
  display: flex; align-items: center; gap: 16px;
}
.bottom-ornament::before, .bottom-ornament::after {
  content: ''; width: 80px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(201,169,110,0.3));
}
.bottom-ornament::after { background: linear-gradient(to left, transparent, rgba(201,169,110,0.3)); }
.bottom-ornament span { font-size: 18px; color: var(--gold); opacity: .5; }
.bottom-text { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: .25; }

/* reveal */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity .9s ease, transform .9s ease; }
.reveal.visible { opacity: 1; transform: none; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 520px) {
  .upload-card { padding: 24px 18px; }
  .slide-item img { height: 280px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="site-bg"></div>

<!-- HEADER -->
<header class="page-header">
  <div style="position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; animation: fadeUp .8s ease .1s both;">
    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Davete Dön
    </a>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-text">Anı Galerisi</div>
      <div class="ornament-line r"></div>
    </div>
    <div class="page-title">Anlarınızı Paylaşın</div>
    <div class="page-sub">Güzel anlarınızı bu özel günün hatırası için yükleyin</div>
  </div>
</header>

<!-- MAIN -->
<main class="main-content">

  <!-- UPLOAD CARD -->
  <div class="upload-card reveal">
    <div class="card-label">Fotoğraf Yükle</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp,image/heic,image/heif" />
      <div class="drop-icon" id="dropIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <div class="drop-title" id="dropTitle">Fotoğraf Seçin veya Sürükleyin</div>
      <div class="drop-sub">JPEG · PNG · WEBP · GIF · HEIC</div>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Önizleme" />
      <div class="preview-clear" id="previewClear" title="Kaldır">✕</div>
    </div>

    <div class="form-fields">
      <div class="field-group">
        <label class="field-label" for="nameInput">İsim <span class="field-required">*</span></label>
        <input class="field-input" type="text" id="nameInput" placeholder="Adınızı yazın" maxlength="80" />
      </div>
      <div class="field-group">
        <label class="field-label" for="commentInput">Yorum <span style="opacity:.4;font-size:10px;letter-spacing:1px;">(isteğe bağlı)</span></label>
        <textarea class="field-textarea" id="commentInput" placeholder="Güzel bir anı notu bırakın…" maxlength="300"></textarea>
      </div>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <button class="btn-submit" id="submitBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Fotoğrafı Yükle
    </button>

    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- GALLERY SECTION -->
  <div class="gallery-section reveal">
    <div class="gallery-header">
      <div class="gallery-title-wrap">
        <div class="gallery-title">Anı Defteri</div>
        <div class="gallery-count" id="galleryCount">Yükleniyor…</div>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btnSlide" onclick="setView('slide')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M8 12h8M12 8v8" opacity="0"/><path d="M2 9h20M2 15h20" opacity="0"/></svg>
          Slayt
        </button>
        <button class="view-btn" id="btnGrid" onclick="setView('grid')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Grid
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div class="spinner-wrap" id="galleryLoading">
      <div class="spinner"></div>
    </div>

    <!-- Empty -->
    <div class="gallery-empty" id="galleryEmpty" style="display:none;">
      <div class="gallery-empty-icon">📷</div>
      <div class="gallery-empty-text">Henüz fotoğraf yüklenmedi.<br>İlk anıyı paylaşan siz olun!</div>
    </div>

    <!-- Slideshow -->
    <div class="slideshow-wrap" id="slideshowWrap" style="display:none;">
      <div class="slide-counter" id="slideCounter">1 / 1</div>
      <div class="slide-track" id="slideTrack"></div>
      <button class="slide-nav prev" id="slidePrev" onclick="changeSlide(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="slide-nav next" id="slideNext" onclick="changeSlide(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="slide-dots" id="slideDots"></div>
    </div>

    <!-- Grid -->
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" />
  <div class="lightbox-caption">
    <div class="lightbox-name" id="lightboxName"></div>
    <div class="lightbox-comment" id="lightboxComment"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="page-bottom">
  <div class="bottom-ornament"><span>♡</span></div>
  <div class="bottom-text">Firdevs & Hasan Çağlar · 2026</div>
</div>

<script>
/* ════════════════════════════════
   SUPABASE CONFIG
════════════════════════════════ */
const SUPABASE_URL = "https://gtadvplwwwlxutflmcix.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YWR2cGx3d3dseHV0ZmxtY2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzM4MzEsImV4cCI6MjA4OTk0OTgzMX0.ZlZK0GAFJBBA_akAimXKrGTUzSf4jPwfBa1bZ0EEQzc";
const BUCKET = "photos";

const headers = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
};

/* ════════════════════════════════
   UPLOAD LOGIC
════════════════════════════════ */
let selectedFile = null;

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const previewClear = document.getElementById('previewClear');
const submitBtn  = document.getElementById('submitBtn');
const nameInput  = document.getElementById('nameInput');
const commentInput = document.getElementById('commentInput');
const statusMsg  = document.getElementById('statusMsg');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const dropTitle  = document.getElementById('dropTitle');

function setFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    previewWrap.style.display = 'block';
    dropTitle.textContent = file.name;
  };
  reader.readAsDataURL(file);
  checkSubmit();
}

function checkSubmit() {
  submitBtn.disabled = !(selectedFile && nameInput.value.trim());
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
nameInput.addEventListener('input', checkSubmit);

previewClear.addEventListener('click', () => {
  selectedFile = null;
  previewWrap.style.display = 'none';
  previewImg.src = '';
  fileInput.value = '';
  dropTitle.textContent = 'Fotoğraf Seçin veya Sürükleyin';
  checkSubmit();
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
});

function showStatus(type, msg) {
  statusMsg.className = 'status-msg ' + type;
  statusMsg.textContent = msg;
}
function hideStatus() {
  statusMsg.className = 'status-msg';
}

submitBtn.addEventListener('click', async () => {
  if (!selectedFile || !nameInput.value.trim()) return;
  submitBtn.disabled = true;
  hideStatus();
  progressWrap.style.display = 'block';
  progressFill.style.width = '10%';

  try {
    const ext  = selectedFile.name.split('.').pop().toLowerCase() || 'jpg';
    const uid  = crypto.randomUUID();
    const path = `${uid}.${ext}`;

    // Upload to Storage
    progressFill.style.width = '35%';
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'POST',
      headers: { ...headers, 'Content-Type': selectedFile.type },
      body: selectedFile,
    });
    if (!uploadRes.ok) throw new Error('Dosya yüklenemedi: ' + uploadRes.status);

    progressFill.style.width = '65%';

    // Get public URL
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;

    // Insert row
    const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/photos`, {
      method: 'POST',
      headers: {
        ...headers,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        id: uid,
        url: publicUrl,
        name: nameInput.value.trim(),
        comment: commentInput.value.trim() || null,
      }),
    });
    if (!insertRes.ok) throw new Error('Kayıt eklenemedi: ' + insertRes.status);

    progressFill.style.width = '100%';
    showStatus('success', '✓ Fotoğrafınız başarıyla eklendi! Teşekkürler ♡');

    // reset
    setTimeout(() => { progressWrap.style.display = 'none'; progressFill.style.width = '0%'; }, 800);
    previewClear.click();
    nameInput.value = '';
    commentInput.value = '';

    // reload gallery
    await loadPhotos();

  } catch (err) {
    progressFill.style.width = '0%';
    setTimeout(() => { progressWrap.style.display = 'none'; }, 400);
    showStatus('error', '✗ Hata: ' + err.message);
    submitBtn.disabled = false;
    checkSubmit();
  }
});

/* ════════════════════════════════
   GALLERY LOGIC
════════════════════════════════ */
let photos = [];
let currentSlide = 0;
let currentView = 'slide';

// Touch/swipe
let touchStartX = 0;
const slideshowWrap = document.getElementById('slideshowWrap');
slideshowWrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
slideshowWrap.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) changeSlide(dx < 0 ? 1 : -1);
});

function changeSlide(dir) {
  if (!photos.length) return;
  currentSlide = (currentSlide + dir + photos.length) % photos.length;
  updateSlide();
}

function goToSlide(idx) {
  currentSlide = idx;
  updateSlide();
}

function updateSlide() {
  const track = document.getElementById('slideTrack');
  track.style.transform = `translateX(-${currentSlide * 100}%)`;

  document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${photos.length}`;

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentSlide);
  });
}

function buildSlideshow() {
  const track = document.getElementById('slideTrack');
  const dots  = document.getElementById('slideDots');
  track.innerHTML = '';
  dots.innerHTML = '';

  photos.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'slide-item';
    const date = new Date(p.created_at).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
    item.innerHTML = `
      <img src="${p.url}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%23111%22 width=%22400%22 height=%22300%22/%3E%3Ctext fill=%22%23555%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2216%22%3EGörsel yüklenemedi%3C/text%3E%3C/svg%3E'" />
      <div class="slide-caption">
        <div class="slide-name">${p.name}</div>
        ${p.comment ? `<div class="slide-comment">${p.comment}</div>` : ''}
        <div class="slide-date">${date}</div>
      </div>`;
    track.appendChild(item);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });

  // Hide dots if too many
  dots.style.display = photos.length > 20 ? 'none' : 'flex';
  currentSlide = 0;
  updateSlide();
}

function buildGrid() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  photos.forEach(p => {
    const item = document.createElement('div');
    item.className = 'grid-item';
    item.innerHTML = `
      <img src="${p.url}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'" />
      <div class="grid-item-overlay">
        <div class="grid-item-name">${p.name}</div>
      </div>`;
    item.addEventListener('click', () => openLightbox(p));
    grid.appendChild(item);
  });
}

function setView(view) {
  currentView = view;
  document.getElementById('btnSlide').classList.toggle('active', view === 'slide');
  document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
  document.getElementById('slideshowWrap').style.display = (view === 'slide' && photos.length) ? 'block' : 'none';
  const gg = document.getElementById('galleryGrid');
  if (view === 'grid' && photos.length) gg.classList.add('visible');
  else gg.classList.remove('visible');
}

function openLightbox(p) {
  document.getElementById('lightboxImg').src = p.url;
  document.getElementById('lightboxName').textContent = p.name;
  document.getElementById('lightboxComment').textContent = p.comment || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.closest('.lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') }); });

async function loadPhotos() {
  document.getElementById('galleryLoading').style.display = 'flex';
  document.getElementById('galleryEmpty').style.display   = 'none';
  document.getElementById('slideshowWrap').style.display  = 'none';
  document.getElementById('galleryGrid').classList.remove('visible');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?select=*&order=created_at.desc`, {
      headers: { ...headers, 'Accept': 'application/json' },
    });
    photos = await res.json();
    if (!Array.isArray(photos)) photos = [];
  } catch(e) {
    photos = [];
  }

  document.getElementById('galleryLoading').style.display = 'none';
  document.getElementById('galleryCount').textContent =
    photos.length ? `${photos.length} fotoğraf` : '';

  if (!photos.length) {
    document.getElementById('galleryEmpty').style.display = 'block';
    return;
  }

  buildSlideshow();
  buildGrid();
  setView(currentView);
}

/* ── SCROLL REVEAL ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ── INIT ── */
loadPhotos();
</script>
</body>
</html>
