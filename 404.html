<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa Bulunamadı — Firdevs & Hasan Çağlar</title>

<link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream: #f5efe6;
  --gold:  #c9a96e;
  --gold2: #e8d5b0;
  --dark:  #1a1410;
}

body {
  font-family: 'Cormorant Garamond', serif;
  color: var(--cream);
  min-height: 100vh;
  background: var(--dark);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background: url("https://images.unsplash.com/photo-1519741497674-611481863552?w=1600") center/cover no-repeat;
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(160deg, rgba(26,20,16,0.88) 0%, rgba(26,20,16,0.72) 50%, rgba(26,20,16,0.92) 100%);
}

.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.wrap {
  position: relative; z-index: 2;
  text-align: center;
  padding: 40px 24px;
  max-width: 480px;
  animation: fadeUp .9s cubic-bezier(.4,0,.2,1) both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.ornament {
  font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold); opacity: .75;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-bottom: 32px;
}
.ornament::before, .ornament::after {
  content: ''; width: 40px; height: 1px; background: var(--gold); opacity:.5;
}

.four {
  font-family: 'Luxurious Script', cursive;
  font-size: clamp(100px, 28vw, 160px);
  font-weight: 400;
  line-height: 1;
  color: var(--gold2);
  opacity: .18;
  letter-spacing: -4px;
  user-select: none;
  margin-bottom: -16px;
}

.title {
  font-family: 'Luxurious Script', cursive;
  font-size: clamp(32px, 8vw, 48px);
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 16px;
}
.title em { font-style: normal; color: var(--gold2); }

.divider {
  width: 1px; height: 36px; margin: 0 auto 20px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  opacity: .45;
}

.message {
  font-size: 15px;
  line-height: 1.8;
  color: rgba(245,239,230,0.55);
  letter-spacing: .3px;
  margin-bottom: 36px;
}

.btn {
  display: inline-block;
  padding: 13px 36px;
  border-radius: 50px;
  border: 1px solid rgba(201,169,110,0.45);
  background: rgba(201,169,110,0.1);
  color: var(--gold2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  transition: background .3s, border-color .3s, transform .2s;
  backdrop-filter: blur(8px);
}
.btn:hover {
  background: rgba(201,169,110,0.2);
  border-color: var(--gold);
  transform: translateY(-2px);
}

.footer-ornament {
  margin-top: 48px;
  font-size: 18px;
  color: var(--gold);
  opacity: .25;
  letter-spacing: 8px;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>

<div class="wrap">
  <div class="ornament">Sayfa Bulunamadı</div>

  <div class="four">404</div>

  <div class="title">Kaybolmuş<br><em>bir an…</em></div>

  <div class="divider"></div>

  <p class="message">
    Aradığınız sayfa burada değil.<br>
    Ama güzel anılar sizi bekliyor.
  </p>

  <a href="index.html" class="btn">Ana Sayfaya Dön</a>

  <div class="footer-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
</div>

</body>
</html>
